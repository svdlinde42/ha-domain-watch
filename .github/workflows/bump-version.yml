name: Bump version

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'custom_components/domain_watch/manifest.json'

jobs:
  bump:
    name: Bump patch version
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump patch version in manifest.json
        id: ver
        run: |
          VERSION=$(jq -r '.version' custom_components/domain_watch/manifest.json)
          NEW=$(python3 -c "v='${VERSION}'; p=v.split('.'); p[2]=str(int(p[2])+1); print('.'.join(p))")
          jq --arg v "$NEW" '.version = $v' custom_components/domain_watch/manifest.json > manifest.tmp
          mv manifest.tmp custom_components/domain_watch/manifest.json
          echo "version=${NEW}" >> "$GITHUB_OUTPUT"

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add custom_components/domain_watch/manifest.json
          git diff --staged --quiet || git commit -m "chore: bump version to ${{ steps.ver.outputs.version }}"
          git push
